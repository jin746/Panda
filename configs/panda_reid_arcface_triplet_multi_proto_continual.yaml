BASE: ['panda_reid_arcface_triplet.yaml']

MODEL:
  PROTO_AUX_WEIGHT: 0.08
  PROTO_CONF_WEIGHT: 1.0
  PROTO_QUAL_WEIGHT: 0.5
  SUPCON_WEIGHT: 0.08
  SUPCON_TEMP: 0.07

  # Training-stage multi-prototype metric learning.
  MULTI_PROTO_TRAIN_WEIGHT: 0.20
  MULTI_PROTO_TEMP: 0.07
  MULTI_PROTO_HARD_NEG_K: 32
  MULTI_PROTO_MAX_SLOTS: 4
  MULTI_PROTO_MOMENTUM: 0.90
  MULTI_PROTO_SPAWN_THRESHOLD: 0.55
  MULTI_PROTO_UPDATE_THRESHOLD: 0.45
  MULTI_PROTO_BOOTSTRAP_BATCHES: 8

  # Training-stage continual metric consistency against historical prototypes.
  CONTINUAL_METRIC_WEIGHT: 0.10
  CONTINUAL_METRIC_MARGIN: 0.10
  CONTINUAL_METRIC_HARD_NEG_K: 16
  CONTINUAL_METRIC_STABILITY_WEIGHT: 0.50

OUTPUT: 'output_prototype_arcface_triplet_multi_proto_continual'
TAG: 'arcface_triplet_multi_proto_continual'
