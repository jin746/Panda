BASE: ['']

DATA:
  DATASET: 'panda_reid'
  BATCH_SIZE: 32
  IMG_SIZE: 192
  INTERPOLATION: 'bicubic'
  PIN_MEMORY: True
  NUM_WORKERS: 10

MODEL:
  TYPE: 'swinv2'
  NAME: 'panda_openworld_reid_only_swinv2'
  PRETRAINED: 'modelori/swinv2_large_patch4_window12_192_22k.pth'
  RESUME: ''
  DROP_RATE: 0.1
  ATTN_DROP_RATE: 0.1
  DROP_PATH_RATE: 0.2
  LABEL_SMOOTHING: 0.1

  NECK_FEAT: 'after'
  PROJ_DIM: 768
  PROJ_DROP: 0.1
  AUX_DETACH: True
  AUX_GRAD_RATIO: 1.0

  ARCFACE_SCALE: 24.0
  ARCFACE_MARGIN: 0.35
  ARCFACE_WEIGHT: 0.6
  TRIPLET_MARGIN: 0.45
  TRIPLET_WEIGHT: 1.5
  HARD_MINING: True
  CENTER_WEIGHT: 0.03
  VARIANCE_WEIGHT: 0.001

  # Dedicated age/gender is trained by separate model.
  GENDER_WEIGHT: 0.0
  GENDER_LABEL_SMOOTHING: 0.0
  GENDER_USE_CLASS_WEIGHTS: False
  GENDER_CLASS_WEIGHT_POWER: 0.5
  GENDER_CLASS_WEIGHT_CLAMP: 5.0

  AGE_WEIGHT: 0.0
  AGE_LOSS_BETA: 1.0
  AGE_USE_BIN_WEIGHTS: False
  AGE_BIN_SIZE: 2.0
  AGE_BIN_WEIGHT_POWER: 0.5
  AGE_BIN_WEIGHT_CLAMP: 5.0

  PROTO_AUX_WEIGHT: 0.1
  PROTO_CONF_WEIGHT: 1.0
  PROTO_QUAL_WEIGHT: 0.6
  PROTO_LR_MULT: 8.0

  SWINV2:
    PATCH_SIZE: 4
    IN_CHANS: 3
    EMBED_DIM: 192
    DEPTHS: [2, 2, 18, 2]
    NUM_HEADS: [6, 12, 24, 48]
    WINDOW_SIZE: 12
    MLP_RATIO: 4.0
    QKV_BIAS: True
    APE: False
    PATCH_NORM: True
    PRETRAINED_WINDOW_SIZES: [12, 12, 12, 12]

TRAIN:
  START_EPOCH: 0
  EPOCHS: 10
  WARMUP_EPOCHS: 1
  WEIGHT_DECAY: 0.01
  BASE_LR: 2e-4
  WARMUP_LR: 1e-6
  MIN_LR: 1e-7
  CLIP_GRAD: 1.0
  AUTO_RESUME: True
  ACCUMULATION_STEPS: 1
  USE_CHECKPOINT: False

  LR_SCHEDULER:
    NAME: 'cosine'
    DECAY_EPOCHS: 20
    DECAY_RATE: 0.1
    RESTART_EPOCHS: []
    MULTISTEPS: []
    GAMMA: 0.1

  OPTIMIZER:
    NAME: 'adamw'
    EPS: 1e-8
    BETAS: [0.9, 0.999]
    MOMENTUM: 0.9

AUG:
  COLOR_JITTER: 0.2
  AUTO_AUGMENT: 'rand-m7-mstd0.5-inc1'
  REPROB: 0.1
  REMODE: 'pixel'
  RECOUNT: 1
  MIXUP: 0.0
  CUTMIX: 0.0
  MIXUP_PROB: 0.0
  MIXUP_SWITCH_PROB: 0.0
  MIXUP_MODE: 'batch'

TEST:
  CROP: True
  SEQUENTIAL: False

AMP_ENABLE: True
OUTPUT: 'output_openworld_reid_only'
TAG: 'swinv2_reid_only'
SAVE_FREQ: 999
PRINT_FREQ: 30
